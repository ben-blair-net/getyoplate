<style>
  :root{
    --g:#D4A017; --gl:#EFC040; --gd:#8B6914; --bg:#0C0A06; --ck:#1C1710; --ck2:#221C10;
    --bd:#302510; --tx:#F0EBE0; --tm:#5A5040; --ts:#9A8A6E; --grn:#22c55e; --grb:#0A2015;
    --grt:#4ade80; --blu:#2563eb; --field:#13100A;
    --display:'Anton',sans-serif; --body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#060402;font-family:var(--body);color:var(--tx);-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center}
  button{font-family:var(--body);cursor:pointer;transition:opacity .15s,transform .08s,background .15s,border-color .15s}
  button:active{transform:scale(.98)}
  input,textarea{font-family:var(--body)}
  input::placeholder,textarea::placeholder{color:#4A4030}
  input:focus,textarea:focus{border-color:var(--gd)!important;outline:none}
  ::-webkit-scrollbar{width:0;height:0}

  .frame{width:100%;max-width:430px;flex:1;background:var(--bg);position:relative;overflow:hidden}
  @media(min-width:520px){
    .frame{max-width:400px;margin:18px auto 26px;border-radius:30px;border:1px solid var(--bd);min-height:780px;box-shadow:0 30px 90px -20px rgba(0,0,0,.8)}
  }

  .wordmark{font-family:var(--display);letter-spacing:.4px;line-height:.92;text-transform:uppercase}
  .lbl{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.09em;font-weight:600}
  .fadein{animation:fin .32s ease}
  @keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes blip{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes bin{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:scale(1)}}
  @keyframes tdot{0%,60%,100%{opacity:.25}30%{opacity:1}}
  .bub{animation:bin .3s ease}
  @media(prefers-reduced-motion:reduce){.fadein,.bub{animation:none}}

  .field{display:block;width:100%;background:var(--field);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:15px;padding:12px 13px}
  .field.err{border-color:#7a2a2a}
</style>

  function logo(){
    return '<img src="'+LOGO_B64+'" alt="Get Yo Plate — Catering — Big Southern Flavors — Spokane, WA" width="96" height="96" style="display:block;margin:0 auto;border-radius:50%;box-shadow:0 6px 26px rgba(212,160,23,.28)"/>';

  // Weekly drop config — edit freely between test sessions
  var DROP={
    item:"Smothered Pork Chops",
    desc:"Fall-off-the-bone pork chops in seasoned gravy — choice of 2 sides (mac & cheese, collards, candied yams, or red beans & rice).",
    price:20,
    dietary:"Contains pork & dairy. Gravy is flour-based — not gluten-free.",
    deadlineLabel:"Sat, Jul 25",
    dropDayLabel:"Sunday, Jul 26",
    dropDayShort:"Jul 26",
    sold:38, cap:50
  };

  // In-memory only — every tester gets a clean slate on load/refresh.
  var S={screen:"form",name:"",phone:"",qty:1,notes:"",order:null,smsStage:0,confirmed:false,optedIn:false};
  var timers=[];
  function later(fn,ms){timers.push(setTimeout(fn,ms));}
  function clearTimers(){timers.forEach(clearTimeout);timers=[];}

  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function fmtPhone(v){var d=v.replace(/\D/g,"").slice(0,10);if(d.length<4)return d;if(d.length<7)return "("+d.slice(0,3)+") "+d.slice(3);return "("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6);}
  function first(n){return n.split(" ")[0];}

  // ── HEADER (logo top center) ──
  function header(){
    return '<div style="text-align:center;padding:24px 18px 2px">'+logo()+'</div>';
  }

  // ── ORDER FORM ──
  function formScreen(){
    var remaining=DROP.cap-DROP.sold-(S.order?S.order.qty:0);
    var lowStock=remaining<=15;
    return header()+'<div class="fadein" style="padding:14px 18px 30px">'
      +'<div style="text-align:center;margin-bottom:16px">'
        +'<div style="font-size:11px;color:'+C.gd+';letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:7px">This Week\'s Drop</div>'
        +'<div class="wordmark" style="font-size:31px;color:'+C.tx+';margin-bottom:11px">'+esc(DROP.item)+'</div>'
        +'<div style="font-size:13px;color:'+C.ts+';line-height:1.55;padding:0 4px">'+esc(DROP.desc)+'</div>'
        +'<div style="display:inline-flex;align-items:flex-start;gap:7px;text-align:left;margin-top:12px;padding:8px 13px;background:#2A1500;border:1px solid #5A3A10;border-radius:9px;font-size:11.5px;color:'+C.gl+';line-height:1.5"><span>⚠️</span><span><b style="letter-spacing:.05em;text-transform:uppercase;font-size:10px">Dietary alerts:</b> '+esc(DROP.dietary)+'</span></div>'
        +'<div style="margin-top:12px;font-size:13px;color:'+C.tx+';font-weight:600">🗓️ Pickup: '+esc(DROP.dropDayLabel)+'</div>'
      +'</div>'
      +'<div style="display:flex;border:1px solid '+C.bd+';border-radius:12px;overflow:hidden;margin-bottom:14px">'
        +meta("$"+DROP.price,"per plate",true)+meta(DROP.deadlineLabel,"order by",false)
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:22px;padding:9px 13px;background:'+(lowStock?"#2A1500":C.ck)+';border:1px solid '+(lowStock?"#5A3A10":C.bd)+';border-radius:10px">'
        +'<div style="flex:1;height:5px;border-radius:3px;background:#2E2515;overflow:hidden"><div style="height:100%;width:'+Math.round((DROP.cap-remaining)/DROP.cap*100)+'%;background:'+(lowStock?C.g:C.gd)+'"></div></div>'
        +'<div style="font-size:11px;font-weight:700;color:'+(lowStock?C.gl:C.ts)+';white-space:nowrap">'+remaining+' plates left</div>'
      +'</div>'
      +field("👤 Your name","name","First name is fine",S.name)
      +field("📱 Phone (for text updates)","phone","(509) 555-0142",S.phone,"tel")
      +'<div style="margin-bottom:16px"><div class="lbl" style="margin-bottom:7px">🍽️ How many plates?</div>'
        +'<div style="display:flex;border:1px solid '+C.bd+';border-radius:10px;overflow:hidden;background:'+C.field+'">'
          +'<button data-act="qty" data-d="-1" style="width:50px;height:48px;background:'+C.ck+';border:none;border-right:1px solid '+C.bd+';color:'+C.gl+';font-size:24px;font-weight:700">−</button>'
          +'<div id="qtyVal" style="flex:1;text-align:center;line-height:48px;font-size:21px;font-weight:800">'+S.qty+'</div>'
          +'<button data-act="qty" data-d="1" style="width:50px;height:48px;background:'+C.ck+';border:none;border-left:1px solid '+C.bd+';color:'+C.gl+';font-size:24px;font-weight:700">+</button>'
        +'</div></div>'
      +'<div style="margin-bottom:22px"><div class="lbl" style="margin-bottom:7px">📝 Notes / Requests <span style="color:#3A3225;text-transform:none;letter-spacing:0;font-weight:400">· optional</span></div>'
        +'<div style="margin-bottom:9px;padding:11px 14px;background:'+C.ck+';border:1px solid '+C.gd+'55;border-left:3px solid '+C.gd+';border-radius:9px;font-size:12px;color:'+C.ts+';line-height:1.6;font-style:italic">"Some of this stuff just has to be made in a batch in a big pot like my Grandma taught me. Unfortunately that means I can\'t always accommodate dietary restrictions — I\'ll let you know in the dietary alerts what I can\'t change." <span style="color:'+C.gl+';font-style:normal;font-weight:700">— Avant</span></div>'
        +'<textarea id="f_notes" class="field" style="resize:vertical;min-height:58px;font-size:14px" placeholder="Side choices, requests, ideas for next time…">'+esc(S.notes)+'</textarea></div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:'+C.ck+';border:1px solid '+C.bd+';border-radius:12px;margin-bottom:13px">'
        +'<span class="lbl">Total</span><span id="totalVal" style="font-size:27px;font-weight:800;color:'+C.gl+'">$'+(S.qty*DROP.price)+'</span></div>'
      +'<button data-act="place" style="width:100%;padding:16px;border-radius:12px;border:none;background:'+C.g+';color:'+C.bg+';font-size:15px;font-weight:800;letter-spacing:.02em">Place order →</button>'
      +'<div style="font-size:10px;color:'+C.tm+';text-align:center;margin-top:11px;line-height:1.5">You\'ll get a text to confirm + payment instructions.<br>No payment taken on this page.</div>'
      +'</div>';
  }
  function meta(v,l,gold){return '<div style="flex:1;text-align:center;padding:11px 4px;background:'+C.ck+';border-left:1px solid '+C.bd+'"><div style="font-size:16px;font-weight:800;color:'+(gold?C.gl:C.tx)+'">'+v+'</div><div class="lbl" style="margin-top:2px">'+l+'</div></div>';}
  function field(label,id,ph,val,type){return '<div style="margin-bottom:16px"><div class="lbl" style="margin-bottom:7px">'+label+'</div>'
    +'<input id="f_'+id+'" class="field" '+(type==="tel"?'inputmode="tel"':'')+' placeholder="'+ph+'" value="'+esc(val)+'"/>'
    +'<div id="err_'+id+'" style="font-size:10px;color:#d97a7a;margin-top:5px;display:none"></div></div>';}

  // ── RECEIPT ──
  function confirmScreen(){
    var o=S.order;
    return header()+'<div class="fadein" style="padding:16px 22px 34px;text-align:center">'
      +'<div style="width:66px;height:66px;border-radius:50%;background:'+C.grb+';border:2px solid '+C.grn+';display:flex;align-items:center;justify-content:center;margin:0 auto 18px;animation:pop .5s ease;font-size:30px">✓</div>'
      +'<div class="wordmark" style="font-size:25px;color:'+C.gl+';margin-bottom:9px">Order received!</div>'
      +'<div style="font-size:14px;color:'+C.ts+';line-height:1.6;margin-bottom:22px">Thanks '+esc(first(o.name))+' — check your phone. We just texted <span style="color:'+C.tx+';font-weight:600">'+esc(o.phone)+'</span> with payment instructions.</div>'
      +'<div style="background:'+C.ck+';border:1px solid '+C.bd+';border-top:2px dashed '+C.gd+';border-radius:12px;padding:16px 18px;text-align:left;margin-bottom:16px">'
        +'<div style="font-family:monospace;font-size:10px;color:'+C.tm+';letter-spacing:.1em;margin-bottom:10px">TICKET #'+o.id+'</div>'
        +row("Item",esc(DROP.item))
        +row("Plates",o.qty+" × $"+DROP.price)
        +row("Pickup",esc(DROP.dropDayLabel))
        +(o.notes?row("Notes",'<i style="color:'+C.ts+'">"'+esc(o.notes)+'"</i>'):"")
        +'<div style="display:flex;justify-content:space-between;padding:10px 0 2px;margin-top:6px;border-top:1px solid '+C.bd+'"><span style="color:'+C.gl+';font-weight:700;font-size:14px">Total</span><span style="color:'+C.gl+';font-weight:800;font-size:18px">$'+o.total+'</span></div>'
      +'</div>'
      +'<div style="background:'+C.field+';border:1px solid '+C.bd+';border-radius:11px;padding:13px 16px;font-size:12px;color:'+C.ts+';line-height:1.6;margin-bottom:18px">Pay by <b style="color:'+C.gl+'">Venmo @getyoplate</b> or <b style="color:'+C.gl+'">CashApp $getyoplat509</b>, then reply <b style="color:'+C.grt+'">PAID</b> to our text.</div>'
      +'<button data-act="goSms" style="width:100%;padding:14px;border-radius:12px;border:1px solid '+C.gd+';background:#1C1408;color:'+C.gl+';font-size:14px;font-weight:700">💬 View your texts</button>'
      +'</div>';
  }
  function row(k,v){return '<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px"><span style="color:'+C.tm+'">'+k+'</span><span style="color:'+C.tx+';font-weight:600;text-align:right;max-width:62%">'+v+'</span></div>';}

  // ── SMS THREAD ──
  function smsScreen(){
    var o=S.order, msgs=[];
    msgs.push(bot("Hey "+first(o.name)+"! 🍑 You're in for this week's drop: "+DROP.item+" — $"+DROP.price+"/plate, pickup "+DROP.dropDayLabel.split(",")[0]+".\n\nYou ordered "+o.qty+" plate"+(o.qty>1?"s":"")+" = $"+o.total+"."));
    msgs.push(bot("To lock it in:\nVenmo @getyoplate or CashApp $getyoplat509 for $"+o.total+".\n\nReply PAID once you send it 👍","Payment instructions"));
    if(S.smsStage>=1){
      msgs.push(usr("PAID"));
      msgs.push(bot("Got it! 🙌 You're flagged for review — confirmation coming soon. Hang tight!","Auto-reply"));
    }
    if(S.smsStage>=1&&!S.confirmed){
      msgs.push('<div id="typing" class="bub" style="display:flex;margin-bottom:9px"><div style="padding:12px 16px;border-radius:18px;border-bottom-left-radius:5px;background:#262220;display:flex;gap:5px;align-items:center">'
        +'<span style="width:7px;height:7px;border-radius:50%;background:'+C.ts+';animation:tdot 1.2s infinite"></span>'
        +'<span style="width:7px;height:7px;border-radius:50%;background:'+C.ts+';animation:tdot 1.2s .2s infinite"></span>'
        +'<span style="width:7px;height:7px;border-radius:50%;background:'+C.ts+';animation:tdot 1.2s .4s infinite"></span></div></div>');
    }
    if(S.confirmed){
      msgs.push(bot("You're confirmed "+first(o.name)+"! ✅ See you "+DROP.dropDayLabel.split(",")[0]+" for pickup. Thanks for ordering with Get Yo Plate 🙌🔥","From the kitchen"));
      msgs.push(bot("Wanna hear about next week's menu first? Reply YES to join our drop list 📲","Optional"));
    }
    if(S.optedIn){
      msgs.push(usr("YES"));
      msgs.push(bot("You're on the list! 🎉 You'll get first dibs every week. Talk soon!"));
    }

    var ctrl;
    if(S.smsStage<1) ctrl=btn('data-act="paid"',C.blu,"#0f1f3d","#7AA5F5","↑ Reply “PAID”");
    else if(!S.confirmed) ctrl='<div style="text-align:center;font-size:11px;color:'+C.tm+';padding:6px 0">The kitchen is confirming your payment…</div>';
    else if(!S.optedIn) ctrl=btn('data-act="yes"',C.blu,"#0f1f3d","#7AA5F5","↑ Reply “YES”");
    else ctrl='<div style="text-align:center;padding:2px 0"><div style="font-size:12px;color:'+C.grt+';font-weight:700;margin-bottom:10px">🎉 That\'s the whole flow — thanks for testing!</div>'
      +'<button data-act="restart" style="width:100%;padding:12px;border-radius:22px;border:1px solid '+C.bd+';background:'+C.ck+';color:'+C.tm+';font-size:13px;font-weight:600">↺ Try it again</button></div>';

    return '<div style="background:#0A0805;border-bottom:1px solid '+C.bd+';padding:12px 16px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:5">'
        +'<div style="width:38px;height:38px;border-radius:50%;background:'+C.g+';display:flex;align-items:center;justify-content:center;font-size:18px">🍑</div>'
        +'<div><div style="font-size:14px;font-weight:700">Get Yo Plate</div><div style="font-size:11px;color:'+C.tm+'">+1 (509) 555-PLATE · auto-texts</div></div>'
        +'<button data-act="goReceipt" style="margin-left:auto;background:none;border:none;color:'+C.gd+';font-size:12px;font-weight:600">← Receipt</button></div>'
      +'<div style="padding:16px 14px 8px;min-height:340px">'+msgs.join("")+'</div>'
      +'<div style="border-top:1px solid '+C.bd+';padding:13px 14px;background:#0A0805;position:sticky;bottom:0">'+ctrl+'</div>';
  }
  function btn(attr,bc,bg,col,label){return '<button '+attr+' style="width:100%;padding:13px;border-radius:22px;border:1px solid '+bc+';background:'+bg+';color:'+col+';font-size:13px;font-weight:700">'+label+'</button>';}
  function bot(text,sub){return '<div class="bub" style="display:flex;flex-direction:column;align-items:flex-start;margin-bottom:'+(sub?3:9)+'px">'
    +'<div style="max-width:80%;padding:10px 13px;border-radius:18px;border-bottom-left-radius:5px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;background:#262220;color:'+C.tx+'">'+esc(text)+'</div>'
    +(sub?'<div style="font-size:9px;color:'+C.tm+';margin:3px 6px 9px;letter-spacing:.03em;text-transform:uppercase;font-weight:600">'+sub+'</div>':'')+'</div>';}
  function usr(text){return '<div class="bub" style="display:flex;justify-content:flex-end;margin-bottom:9px">'
    +'<div style="max-width:80%;padding:10px 13px;border-radius:18px;border-bottom-right-radius:5px;font-size:13.5px;line-height:1.5;background:'+C.blu+';color:#fff;font-weight:600">'+esc(text)+'</div></div>';}

  // ── RENDER + EVENTS ──
  function render(){
    var app=document.getElementById("app");
    app.innerHTML=S.screen==="form"?formScreen():S.screen==="confirm"?confirmScreen():smsScreen();
    if(S.screen==="sms")app.scrollTop=app.scrollHeight;
    else app.scrollTop=0;
  }

  document.getElementById("app").addEventListener("input",function(e){
    var id=e.target.id;
    if(id==="f_name")S.name=e.target.value;
    else if(id==="f_phone"){var f=fmtPhone(e.target.value);e.target.value=f;S.phone=f;}
    else if(id==="f_notes")S.notes=e.target.value;
  });

  document.body.addEventListener("click",function(e){
    var b=e.target.closest("[data-act]");if(!b)return;
    switch(b.getAttribute("data-act")){
      case"qty":{
        var remaining=DROP.cap-DROP.sold;
        S.qty=Math.max(1,Math.min(remaining,S.qty+ +b.getAttribute("data-d")));
        document.getElementById("qtyVal").textContent=S.qty;
        document.getElementById("totalVal").textContent="$"+(S.qty*DROP.price);
        break;}
      case"place":{
        var nameOk=S.name.trim().length>=2, phoneOk=S.phone.replace(/\D/g,"").length>=10;
        err("name","Enter your name",nameOk);
        err("phone","Enter a 10-digit phone so we can text you",phoneOk);
        if(!nameOk||!phoneOk)return;
        S.order={id:Date.now()%100000,name:S.name.trim(),phone:S.phone,qty:S.qty,total:S.qty*DROP.price,notes:S.notes.trim()};
        S.screen="confirm";render();break;}
      case"goSms":S.screen="sms";render();break;
      case"goReceipt":S.screen="confirm";render();break;
      case"paid":{
        S.smsStage=1;render();
        // Simulate the owner confirming from their dashboard a few seconds later
        clearTimers();
        later(function(){S.confirmed=true;render();},4200);
        break;}
      case"yes":S.optedIn=true;render();break;
      case"restart":
        clearTimers();
        S={screen:"form",name:"",phone:"",qty:1,notes:"",order:null,smsStage:0,confirmed:false,optedIn:false};
        render();break;
    }
  });
  function err(id,msg,ok){var el=document.getElementById("err_"+id),inp=document.getElementById("f_"+id);if(el){el.textContent=msg;el.style.display=ok?"none":"block";}if(inp)inp.className="field"+(ok?"":" err");}

  render();
})();
</script>
</body>
</html>
